# Access only via http://intern.local — access by IP or other hostname is rejected
# OpenClaw gateway — bind not configurable; proxy from nginx for LAN access
upstream openclaw {
  server 127.0.0.1:18789;
}

upstream backend {
  server intern:5000;
}

# Reject access by IP or any host other than intern.local (default_server catches all other Hosts)
server {
  listen 80 default_server;
  server_name _;
  return 444;
}

server {
  listen 80;
  server_name intern.local;

  # Canonical host for all proxied requests (backends see intern.local)
  set $canonical_host intern.local;

  # Proxy to OpenClaw gateway (Option B: reverse proxy for LAN access)
  location / {
    proxy_pass http://openclaw;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $canonical_host;
    proxy_cache_bypass $http_upgrade;
  }

  # Create React App — setup UI (build output served as static + SPA fallback)
  # e.g. http://intern.local/setup/
  location = /setup {
    return 301 /setup/;
  }
  location /setup/ {
    alias /usr/share/nginx/html/setup/;
    try_files $uri $uri/ /setup/index.html;
    index index.html;
  }

  # Intern API — e.g. http://intern.local/api/
  location /api/ {
    proxy_pass http://intern;
    proxy_set_header Host $canonical_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  error_page 500 502 503 504 /50x.html;

  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
