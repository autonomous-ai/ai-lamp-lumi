[project]
name = "lelamp-runtime"
version = "0.1.0"
description = "LeLamp hardware driver runtime for Lumi AI Lamp"
requires-python = ">=3.12"
dependencies = [
    "feetech-servo-sdk>=1.0.0",
    "lerobot>=0.3.3",
    "numpy>=2.2.6",
    "fastapi>=0.115.0",
    "uvicorn>=0.34.0",
]

[tool.uv.sources]
lerobot = { git = "https://github.com/huggingface/lerobot" }

[project.optional-dependencies]
hardware = [
    "rpi-ws281x",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["lelamp*"]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"
